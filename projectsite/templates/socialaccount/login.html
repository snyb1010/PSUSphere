{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Confirm Sign In</title>
    <link rel="icon" type="image/jpeg" href="{% static 'img/PSU.jpg' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            /* Mimic the login page background so the overlay feels natural */
            background: url("{% static 'img/PSU-bg.jpg' %}") center/cover no-repeat fixed;
        }

        /* Dark backdrop */
        .modal-backdrop-custom {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1050;
        }

        /* Modal card */
        .modal-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: popIn .2s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.88); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-card .provider-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
        }

        .modal-card h4 {
            font-weight: 700;
            margin-bottom: .5rem;
            color: #1a1a2e;
        }

        .modal-card p {
            color: #555;
            font-size: .95rem;
            margin-bottom: 1.5rem;
        }

        .btn-google {
            background: #4285F4;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: .65rem 1.25rem;
            font-size: .95rem;
            font-weight: 600;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
            margin-bottom: .75rem;
            transition: background .2s;
        }

        .btn-google:hover { background: #3367d6; color: #fff; }

        .btn-cancel {
            width: 100%;
            border-radius: 8px;
            font-size: .9rem;
        }

        .divider {
            border-top: 1px solid #e0e0e0;
            margin: 1.25rem 0;
        }
    </style>
</head>
<body>
    <div class="modal-backdrop-custom">
        <div class="modal-card">
            <!-- PSU logo -->
            <img src="{% static 'img/PSU.jpg' %}" alt="PSU" class="provider-icon rounded-circle">

            <h4>Confirm Sign In</h4>
            <p>You are about to sign in using your<br><strong>{{ provider.name }}</strong> account.</p>

            <div class="divider"></div>

            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn-google">
                    <i class="fab fa-google"></i>
                    Continue with {{ provider.name }}
                </button>
            </form>

            <a href="{% url 'account_login' %}" class="btn btn-outline-secondary btn-cancel">
                Cancel
            </a>
        </div>
    </div>
</body>
</html>
