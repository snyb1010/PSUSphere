{% load static %}

<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <title>Login | PSUSphere</title>
    <meta content='width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, shrink-to-fit=no' name='viewport' />
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i">
    <link rel="stylesheet" href="{% static 'css/ready.css' %}">
    <style>
        body {
            background: #f4f4f4;
        }
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.1);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo h2 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            color: #31ce36;
        }
        .btn-login {
            background-color: #31ce36;
            border-color: #31ce36;
            color: #fff;
            width: 100%;
            font-weight: 600;
        }
        .btn-login:hover {
            background-color: #28a745;
            border-color: #28a745;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <h2>PSUSphere</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                Invalid username or password. Please try again.
            </div>
            {% endif %}

            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username"
                           class="form-control" placeholder="Enter username" autofocus required>
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password"
                           class="form-control" placeholder="Enter password" required>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-login mt-2">Login</button>
            </form>

            <div class="mt-3 text-center text-muted" style="font-size: 0.85rem;">
                <small>Username: <strong>admin</strong> &nbsp;|&nbsp; Password: <strong>admin123</strong></small>
            </div>

        </div>
    </div>

    <script src="{% static 'js/core/jquery.3.2.1.min.js' %}"></script>
    <script src="{% static 'js/core/bootstrap.min.js' %}"></script>
</body>
</html>
